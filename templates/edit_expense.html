<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense | Finora</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            margin: 0;
        }
        .container {
            max-width: 520px;
            margin: 40px auto;
            background: #fff;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        h1 { margin-top: 0; }
        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 600;
            color: #1f2937;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            margin-top: 16px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #1d4ed8;
            color: white;
            padding: 11px;
            font-size: 15px;
            cursor: pointer;
        }
        .flash {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
        }
        .links {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
        }
        .links a {
            text-decoration: none;
            font-weight: 600;
            color: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit Expense</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('expense.edit_expense', id=expense.id) }}">
            <label for="amount">Amount</label>
            <input type="number" step="0.01" min="0.01" id="amount" name="amount" value="{{ expense.amount }}" required>

            <label for="category">Category</label>
            <select id="category" name="category" required>
                {% for category in categories %}
                    <option value="{{ category }}" {% if expense.category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>

            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ expense.description or '' }}</textarea>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" value="{{ expense.date.strftime('%Y-%m-%d') }}" required>

            <button type="submit">Update Expense</button>
        </form>

        <div class="links">
            <a href="{{ url_for('expense.list_expenses') }}">Back to Expenses</a>
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </div>
</body>
</html>
