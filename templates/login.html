<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Finora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #111827;
        }
        p {
            margin-top: 0;
            margin-bottom: 16px;
            color: #4b5563;
        }
        label {
            display: block;
            margin: 10px 0 6px;
            color: #1f2937;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #1d4ed8;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover {
            background: #1e40af;
        }
        .flash {
            list-style: none;
            margin: 0 0 14px;
            padding: 10px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
        }
        .link {
            margin-top: 12px;
            text-align: center;
        }
        .link a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
    <div class="card">
        <h1>Welcome Back</h1>
        <p>Login to continue to your dashboard.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="link">
            New here? <a href="{{ url_for('auth.register') }}">Create account</a>
        </div>
    </div>
    </div>
</body>
</html>
